services:
  - type: web
    name: jahoongir-backend
    runtime: python
    runtimeVersion: 3.11.9
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --no-input
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --worker-class sync --timeout 60
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com,litsey-test.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://litsey-test.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://litsey-test.vercel.app"
databases:
  - name: postgres-db
    databaseName: jahoongir_db
    user: jahoongir_user
    region: frankfurt
